name: CI Pipeline

on:
  push:
    branches: [ "main", "minio" ]
  pull_request:
    branches: [ "main", "minio" ]

jobs:
  test-containers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          MYSQL_ROOT_PASSWORD=root
          MYSQL_DATABASE=yoda
          DATABASE_HOST=database
          DATABASE_PORT=3306
          DATABASE_NAME=yoda
          DATABASE_USER=root
          DATABASE_PASSWORD=root
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_ENDPOINT=minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30

      - name: Check database container
        run: |
          docker ps | grep yoda-database
          docker logs yoda-database

      - name: Check MinIO container
        run: |
          docker ps | grep yoda-minio
          docker logs yoda-minio

      - name: Check backend container
        run: |
          docker ps | grep yoda-backend
          docker logs yoda-backend

      - name: Check frontend container
        run: |
          docker ps | grep yoda-frontend
          docker logs yoda-frontend


      - name: Register test user
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d '{"name":"ci","email":"ci@yoda.fr","password":"admin"}' http://localhost:5000/api/register

      - name: Login and get JWT
        id: login
        run: |
          response=$(curl -s -X POST -H "Content-Type: application/json" -d '{"email":"ci@yoda.fr","password":"admin"}' http://localhost:5000/api/login)
          echo "$response"
          token=$(echo "$response" | grep -o '"token":"[^\"]*"' | cut -d'"' -f4)
          if [ -z "$token" ]; then exit 1; fi
          echo "JWT_TOKEN=$token" >> $GITHUB_ENV

      - name: Test backend API (auth)
        run: |
          curl -f -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/coucou || exit 1

      - name: Test database connection (auth)
        run: |
          response=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/db-test)
          echo "$response"
          echo "$response" | grep -q "success" || exit 1

      - name: Test MinIO file listing (auth)
        run: |
          response=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/files)
          echo "$response"
          echo "$response" | grep -q "success" || exit 1

      - name: Test file upload (auth)
        run: |
          echo "Test content for CI/CD" > test-upload.txt
          response=$(curl -s -F "file=@test-upload.txt" -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/upload)
          echo "$response"
          echo "$response" | grep -q "success" || exit 1
          file_name=$(echo "$response" | grep -o '"object_name":"[^\"]*"' | cut -d'"' -f4)
          echo "Uploaded file: $file_name"
          echo "FILE_NAME=$file_name" >> $GITHUB_ENV

      - name: Test file download (auth)
        run: |
          if [ ! -z "$FILE_NAME" ]; then
            response=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/download/$FILE_NAME)
            echo "$response"
            echo "$response" | grep -q "download_url" || exit 1
          fi

      - name: Test file deletion (auth)
        run: |
          if [ ! -z "$FILE_NAME" ]; then
            response=$(curl -s -X DELETE -H "Authorization: Bearer $JWT_TOKEN" http://localhost:5000/api/delete/$FILE_NAME)
            echo "$response"
            echo "$response" | grep -q "success" || exit 1
          fi

      - name: Test frontend
        run: |
          curl -f http://localhost:5173/ || exit 1

      - name: Stop containers
        if: always()
        run: docker compose down -v