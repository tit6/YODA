# Production — VPS derrière Traefik
# Images pré-buildées depuis GHCR
#
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  database:
    image: mysql:8.0
    container_name: yoda-database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yoda}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schemas.sql:/docker-entrypoint-initdb.d/schemas.sql:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: yoda-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ghcr.io/tit6/yoda-backend:latest
    container_name: yoda-backend
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE:-yoda}
      DATABASE_USER: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    image: ghcr.io/tit6/yoda-frontend:latest
    container_name: yoda-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      - backend
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-network"
      traefik.http.routers.yoda.rule: "Host(`yoda.ampynjord.bzh`)"
      traefik.http.routers.yoda.entrypoints: "websecure"
      traefik.http.routers.yoda.tls.certresolver: "letsencrypt"
      traefik.http.services.yoda.loadbalancer.server.port: "80"

volumes:
  db_data:
  minio_data:

networks:
  traefik-network:
    external: true
